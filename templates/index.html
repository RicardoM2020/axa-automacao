<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faturamento AXA — PLL Inovação</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }

    .header {
      text-align: center;
      margin-bottom: 36px;
    }

    .header img { height: 48px; margin-bottom: 12px; }

    .header h1 {
      font-size: 1.6rem;
      color: #1a2e4a;
      font-weight: 700;
    }

    .header p {
      color: #6b7280;
      margin-top: 6px;
      font-size: 0.95rem;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 36px;
      width: 100%;
      max-width: 560px;
    }

    .section-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #9ca3af;
      margin-bottom: 12px;
    }

    .field { margin-bottom: 20px; }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="number"] {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      font-size: 0.95rem;
      color: #111;
      transition: border-color .2s;
    }

    input:focus {
      outline: none;
      border-color: #2563eb;
    }

    .upload-area {
      border: 2px dashed #cbd5e1;
      border-radius: 12px;
      padding: 36px 24px;
      text-align: center;
      cursor: pointer;
      transition: all .2s;
      position: relative;
      margin-bottom: 20px;
    }

    .upload-area:hover, .upload-area.dragover {
      border-color: #2563eb;
      background: #eff6ff;
    }

    .upload-area input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .upload-icon { font-size: 2.5rem; margin-bottom: 10px; }

    .upload-area .label {
      font-weight: 600;
      color: #1e40af;
      font-size: 0.95rem;
    }

    .upload-area .hint {
      font-size: 0.8rem;
      color: #9ca3af;
      margin-top: 4px;
    }

    .file-name {
      background: #f0fdf4;
      border: 1.5px solid #bbf7d0;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.875rem;
      color: #166534;
      display: none;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }

    .toggle-row input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #2563eb;
      cursor: pointer;
    }

    .toggle-row label {
      margin: 0;
      font-weight: 400;
      color: #6b7280;
      font-size: 0.875rem;
      cursor: pointer;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: #1e40af;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s;
      letter-spacing: .02em;
    }

    .btn:hover:not(:disabled) { background: #1d4ed8; }
    .btn:disabled { background: #93c5fd; cursor: not-allowed; }

    /* Log / progresso */
    .progress-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 28px 36px;
      width: 100%;
      max-width: 560px;
      margin-top: 24px;
      display: none;
    }

    .progress-title {
      font-weight: 700;
      color: #1a2e4a;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .spinner {
      width: 20px; height: 20px;
      border: 3px solid #e5e7eb;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      display: inline-block;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .log-box {
      background: #0f172a;
      border-radius: 8px;
      padding: 14px;
      font-family: 'Courier New', monospace;
      font-size: 0.78rem;
      color: #94a3b8;
      max-height: 200px;
      overflow-y: auto;
      line-height: 1.6;
    }

    .log-box .ok { color: #4ade80; }
    .log-box .err { color: #f87171; }

    /* Resultado */
    .result-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 28px 36px;
      width: 100%;
      max-width: 560px;
      margin-top: 24px;
      display: none;
    }

    .result-title {
      font-weight: 700;
      color: #166534;
      font-size: 1.1rem;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat {
      background: #f8fafc;
      border-radius: 10px;
      padding: 14px;
      text-align: center;
    }

    .stat-label {
      font-size: 0.72rem;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: .06em;
      font-weight: 600;
    }

    .stat-value {
      font-size: 1.15rem;
      font-weight: 800;
      color: #1a2e4a;
      margin-top: 4px;
    }

    .stat.total { grid-column: span 2; background: #eff6ff; }
    .stat.total .stat-value { color: #1e40af; font-size: 1.4rem; }

    .download-btns {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn-download {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 13px;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: all .2s;
    }

    .btn-lote {
      background: #1e40af;
      color: #fff;
    }

    .btn-lote:hover { background: #1d4ed8; }

    .btn-conf {
      background: #f0fdf4;
      color: #166534;
      border: 1.5px solid #bbf7d0;
    }

    .btn-conf:hover { background: #dcfce7; }

    .btn-novo {
      margin-top: 8px;
      background: none;
      border: 1.5px solid #e5e7eb;
      color: #6b7280;
      border-radius: 10px;
      padding: 10px;
      font-size: 0.875rem;
      cursor: pointer;
      width: 100%;
      font-weight: 600;
      transition: all .2s;
    }

    .btn-novo:hover { border-color: #9ca3af; color: #374151; }

    .divider {
      border: none;
      border-top: 1px solid #f1f5f9;
      margin: 20px 0;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Faturamento AXA</h1>
    <p>PLL Inovação em Serviços de Tecnologia e Telefonia</p>
  </div>

  <!-- Card principal -->
  <div class="card" id="formCard">
    <div class="section-title">Identificação do Lote</div>

    <div style="display:flex; gap:12px;">
      <div class="field" style="flex:1;">
        <label for="lote_nome">Nome do Lote</label>
        <input type="text" id="lote_nome" value="{{ lote_atual }}" placeholder="B2B 2.0 Lote 86 GIS">
      </div>
      <div class="field" style="width:100px;">
        <label for="lote_numero">Número</label>
        <input type="number" id="lote_numero" value="{{ lote_numero }}" min="1">
      </div>
    </div>

    <hr class="divider">
    <div class="section-title">Relatório ERP</div>

    <div class="file-name" id="fileName"></div>

    <div class="upload-area" id="uploadArea">
      <input type="file" id="arquivo" accept=".csv" onchange="onFileChange(this)">
      <div class="upload-icon">📂</div>
      <div class="label">Clique ou arraste o arquivo CSV</div>
      <div class="hint">Exportado do ERP B2B · PagamentoAxa-YYYY-MM-DD.csv</div>
    </div>

    <div class="toggle-row">
      <input type="checkbox" id="sem_sheets">
      <label for="sem_sheets">Processar sem verificar histórico de faturamentos (modo teste)</label>
    </div>

    <button class="btn" id="btnProcessar" onclick="processar()" disabled>
      Processar Lote
    </button>
  </div>

  <!-- Log de progresso -->
  <div class="progress-card" id="progressCard">
    <div class="progress-title">
      <span class="spinner" id="spinner"></span>
      <span id="progressTitle">Processando...</span>
    </div>
    <div class="log-box" id="logBox"></div>
  </div>

  <!-- Resultado -->
  <div class="result-card" id="resultCard">
    <div class="result-title">✅ Lote gerado com sucesso!</div>
    <div class="stats-grid" id="statsGrid"></div>
    <div class="download-btns" id="downloadBtns"></div>
    <button class="btn-novo" onclick="novoProcessamento()">↩ Novo processamento</button>
  </div>

  <script>
    let currentJobId = null;
    let pollInterval = null;

    function onFileChange(input) {
      const file = input.files[0];
      const nameEl = document.getElementById('fileName');
      if (file) {
        nameEl.textContent = '📄 ' + file.name;
        nameEl.style.display = 'block';
        document.getElementById('uploadArea').style.display = 'none';
        document.getElementById('btnProcessar').disabled = false;
      }
    }

    // Drag & drop
    const area = document.getElementById('uploadArea');
    area.addEventListener('dragover', e => { e.preventDefault(); area.classList.add('dragover'); });
    area.addEventListener('dragleave', () => area.classList.remove('dragover'));
    area.addEventListener('drop', e => {
      e.preventDefault();
      area.classList.remove('dragover');
      const files = e.dataTransfer.files;
      if (files.length) {
        document.getElementById('arquivo').files = files;
        onFileChange(document.getElementById('arquivo'));
      }
    });

    async function processar() {
      const arquivo = document.getElementById('arquivo').files[0];
      if (!arquivo) return;

      const fd = new FormData();
      fd.append('arquivo', arquivo);
      fd.append('lote_nome', document.getElementById('lote_nome').value);
      fd.append('lote_numero', document.getElementById('lote_numero').value);
      fd.append('sem_sheets', document.getElementById('sem_sheets').checked ? '1' : '0');

      document.getElementById('btnProcessar').disabled = true;
      document.getElementById('progressCard').style.display = 'block';
      document.getElementById('resultCard').style.display = 'none';
      document.getElementById('logBox').innerHTML = '';
      document.getElementById('progressTitle').textContent = 'Processando...';
      document.getElementById('spinner').style.display = 'inline-block';

      const resp = await fetch('/processar', { method: 'POST', body: fd });
      const data = await resp.json();
      if (data.erro) { alert(data.erro); return; }

      currentJobId = data.job_id;
      pollInterval = setInterval(verificarStatus, 1500);
    }

    async function verificarStatus() {
      const resp = await fetch('/status/' + currentJobId);
      const data = await resp.json();

      // Atualiza log
      const logBox = document.getElementById('logBox');
      logBox.innerHTML = data.log.map(l => {
        if (l.startsWith('ERRO') || l.includes('Traceback')) return `<div class="err">${l}</div>`;
        if (l.startsWith('TOTAL') || l.includes('concluido')) return `<div class="ok">${l}</div>`;
        return `<div>${l}</div>`;
      }).join('');
      logBox.scrollTop = logBox.scrollHeight;

      if (data.status === 'concluido') {
        clearInterval(pollInterval);
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('progressTitle').textContent = 'Concluído!';
        mostrarResultado(data);
      } else if (data.status === 'erro') {
        clearInterval(pollInterval);
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('progressTitle').textContent = '❌ Erro no processamento';
      }
    }

    function mostrarResultado(data) {
      const r = data.resumo;
      document.getElementById('resultCard').style.display = 'block';

      document.getElementById('statsGrid').innerHTML = `
        <div class="stat">
          <div class="stat-label">Sinistros no Lote</div>
          <div class="stat-value">${r.lote}</div>
        </div>
        <div class="stat">
          <div class="stat-label">Excluídos</div>
          <div class="stat-value">${r.excluidos}</div>
        </div>
        <div class="stat">
          <div class="stat-label">Indenização</div>
          <div class="stat-value" style="font-size:.95rem">${r.indenizacao}</div>
        </div>
        <div class="stat">
          <div class="stat-label">Despesa</div>
          <div class="stat-value" style="font-size:.95rem">${r.despesa}</div>
        </div>
        <div class="stat total">
          <div class="stat-label">Total Geral — ${r.lote_nome}</div>
          <div class="stat-value">${r.total}</div>
        </div>
      `;

      document.getElementById('downloadBtns').innerHTML = `
        <a class="btn-download btn-lote" href="/download/${currentJobId}/lote">
          ⬇ Baixar Lote para AXA (.xlsx)
        </a>
        <a class="btn-download btn-conf" href="/download/${currentJobId}/conferencia">
          ⬇ Baixar Relatório de Conferência (.xlsx)
        </a>
      `;
    }

    function novoProcessamento() {
      document.getElementById('formCard').style.display = 'block';
      document.getElementById('progressCard').style.display = 'none';
      document.getElementById('resultCard').style.display = 'none';
      document.getElementById('fileName').style.display = 'none';
      document.getElementById('uploadArea').style.display = 'block';
      document.getElementById('arquivo').value = '';
      document.getElementById('btnProcessar').disabled = true;
    }
  </script>
</body>
</html>
